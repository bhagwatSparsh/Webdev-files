<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: whitesmoke;
    margin: 0;
    padding: 20px;
}


.container {
    width: 50%;
    margin: auto;
    background-color: pink;
    padding: 25px;
    border: 2px solid lightgray;
    border-radius: 10px;
    box-shadow: 0 0 8px gray;
}

.form-box {
    border: 1px solid #e0e0e0;
    padding: 25px 25px 30px;
    border-radius: 8px;
    background-color: #fafafa;
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.05);
}

h2 {
    font-family:'Times New Roman', Times, serif;
    font-size:36px;
    text-align: center;
    background-color: lightseagreen;
    padding: 10px;
    border-radius: 6px;
}

label {
    font-size: 18px;
    font-weight: bold;
    margin-top: 15px;
    margin-bottom: 8px;
    display: block;
}

input, select, textarea {
    width: 95%;
    padding: 13px;
    margin-top: 5px;
    border: 1px solid gray;
    border-radius: 5px;
    background-color: aliceblue;
}

input:focus, select:focus, textarea:focus {
    background-color: lightyellow;
    outline: none;
    border: 1px solid darkblue;
}

.submit-btn {
    width: 160px;
    padding: 10px;
    margin: 25px auto;
    display: block;
    font-size: 16px;
    background-color: seagreen;
    color: white;
    border: none;
    border-radius: 6px;
    transition: 0.2s;
}


.submit-btn:hover {
    background-color: mediumseagreen;
    cursor: pointer;
}


.submit-btn:active {
    background-color: darkgreen;
    transform: scale(0.96); 
}

#output {
    margin-top: 20px;
    padding: 15px;
    border: 2px solid green;
    background-color: honeydew;
    border-radius: 6px;
    display: none;
}
</style>
</head>

<body>

<div class="container">
<h2>Student Registration Form</h2>

<form onsubmit="showData(); return false;">

<div class="form-box">


<label>First Name</label>
<input type="text" id="fname" name="firstname" placeholder="Enter First Name" required>

<label>Last Name</label>
<input type="text" id="lname" name="lastname" placeholder="Enter Last Name" required>

<label>Email</label>
<input type="email" id="email" name="email" placeholder="Enter Email Address" required>

<label>Password</label>
<input type="password" id="password" name="password" placeholder="Enter Strong Password" required>

<label>Date of Birth</label>
<input type="date" id="dob" name="dob">

<label>Phone Number</label>
<input type="tel" id="phone" name="phone" placeholder="Enter Phone Number">

<label>Gender</label>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other

<label>Department</label>
<select id="dept" name="department">
<option>Computer Science</option>
<option>Electrical</option>
<option>Mechanical</option>
<option>Civil</option>
</select>

<label>Skills</label>
<input type="checkbox" name="skills" value="C++"> C++
<input type="checkbox" name="skills" value="JavaScript"> JavaScript
<input type="checkbox" name="skills" value="Python"> Python

<label>Address</label>
<textarea rows="5" id="address" name="address" placeholder="Enter Your Address"></textarea>

<button type="submit" class="submit-btn">Submit</button>

</form>

<div id="output"></div>
</div>

<script>
function showData()
{
    let fname = document.getElementById("fname").value;
    let lname = document.getElementById("lname").value;
    let email = document.getElementById("email").value;
    let dept = document.getElementById("dept").value;

    let genderList = document.getElementsByName("gender");
    let gender = "Not Selected";

    for (let i = 0; i < genderList.length; i++)
    {
        if (genderList[i].checked)
        {
            gender = genderList[i].value;
        }
    }

    let skillsList = document.getElementsByName("skills");
    let skills = "";

    for (let i = 0; i < skillsList.length; i++)
    {
        if (skillsList[i].checked)
        {
            skills += skillsList[i].value + ", ";
        }
    }

    if (skills === "") skills = "None";

    let outputBox = document.getElementById("output");
    outputBox.style.display = "block";

    outputBox.innerHTML =
        "<h3>Submitted Details</h3>" +
        "Name: " + fname + " " + lname + "<br>" +
        "Email: " + email + "<br>" +
        "Department: " + dept + "<br>" +
        "Gender: " + gender + "<br>" +
        "Skills: " + skills;
}
</script>

</body>
</html>
